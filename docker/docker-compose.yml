services:
  client:
    image: ${REGISTRY:-docker.io}/injurka/wander-mark-client:${V_CLIENT:-latest}
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-80}:3333"
    depends_on:
      - server
    networks:
      - wander-mark

  server:
    image: ${REGISTRY:-docker.io}/injurka/wander-mark-server:${V_SERVER:-latest}
    restart: unless-stopped
    environment:
      PORT: "8080"
      FS_BASE_PATH: /data
    volumes:
      - ${VAULT_PATH:-./vault}:/data:ro
    ports:
      - "${SERVER_PORT:-8080}:4444"
    networks:
      - wander-mark

networks:
  wander-mark:
    driver: bridge
